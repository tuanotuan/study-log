services:
  - type: web
    name: logstudy
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm run db:ensure && npm run start
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: DATABASE_URL
        value: file:/tmp/logstudy.db
      - key: UPLOAD_DIR
        value: /tmp/logstudy-uploads
      - key: SESSION_SECRET
        generateValue: true
