services:
  - type: web
    name: logstudy
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm run db:ensure && npm run start
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: DATABASE_URL
        value: file:/tmp/logstudy.db
      - key: UPLOAD_DIR
        value: /tmp/logstudy-uploads
      - key: APP_URL
        value: https://logstudy.onrender.com
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_SECURE
        value: "true"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: SESSION_SECRET
        generateValue: true
