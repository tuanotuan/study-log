services:
  - type: web
    name: logstudy
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm run db:ensure && npm run start
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: UPLOAD_DIR
        value: /tmp/logstudy-uploads
      - key: APP_URL
        value: https://logstudy.onrender.com
      - key: AUTH_CODE_DEBUG
        value: "true"
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false
      - key: CLOUDINARY_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_FOLDER
        value: logstudy
      - key: SESSION_SECRET
        generateValue: true
