name: Deploy to Render

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
    steps:
      - name: Trigger Render deploy
        if: env.RENDER_DEPLOY_HOOK_URL != ''
        run: curl --fail --show-error --silent "$RENDER_DEPLOY_HOOK_URL"

      - name: Explain skipped deploy
        if: env.RENDER_DEPLOY_HOOK_URL == ''
        run: |
          echo "Set the RENDER_DEPLOY_HOOK_URL repository secret to trigger Render deploys from GitHub Actions."
